<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>38apps</title>
<meta name="description" content="推し活や趣味のために作った便利ツール集">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23241733'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle'%3E%F0%9F%92%9C%3C/text%3E%3C/svg%3E">
<meta name="theme-color" content="#1a1024">
<style>
  :root{
    --bg-0:#140d1c;
    --bg-1:#1b1228;
    --bg-2:#241734;
    --card:#241a35;
    --card-hover:#2d2042;
    --purple-1:#a78bfa;
    --purple-2:#c4b5fd;
    --purple-glow:#8b5cf655;
    --accent:#f0abfc;
    --text-main:#f3eefc;
    --text-sub:#b9aecb;
    --border:#3a2c52;
    --radius:22px;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0;
    padding:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, #3b2a5e55, transparent 55%),
      radial-gradient(circle at 85% 15%, #6d28d955, transparent 50%),
      radial-gradient(circle at 50% 100%, #4c1d9540, transparent 60%),
      var(--bg-0);
    color:var(--text-main);
    font-family:-apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    max-width:520px;
    margin:0 auto;
    padding:56px 20px 40px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  header{
    text-align:center;
    margin-bottom:40px;
    animation:fadeDown .6s ease both;
  }

  .sparkle-row{
    font-size:20px;
    letter-spacing:14px;
    margin-bottom:14px;
    opacity:.9;
  }

  h1{
    margin:0;
    font-size:38px;
    font-weight:800;
    letter-spacing:.5px;
    background:linear-gradient(120deg, var(--purple-2), var(--accent) 60%, var(--purple-1));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .subtitle{
    margin:12px auto 0;
    max-width:280px;
    font-size:14px;
    line-height:1.7;
    color:var(--text-sub);
  }

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .card{
    position:relative;
    display:flex;
    align-items:center;
    gap:16px;
    padding:20px 20px;
    background:linear-gradient(155deg, var(--card), var(--bg-2));
    border:1px solid var(--border);
    border-radius:var(--radius);
    text-decoration:none;
    color:inherit;
    overflow:hidden;
    isolation:isolate;
    cursor:pointer;
    -webkit-user-select:none;
    user-select:none;
    transition:transform .28s cubic-bezier(.22,1,.36,1), box-shadow .28s ease, border-color .28s ease, background .28s ease;
    box-shadow:0 6px 18px -12px #00000080;
    opacity:0;
    transform:translateY(14px);
    animation:cardIn .55s cubic-bezier(.22,1,.36,1) forwards;
  }

  .card::before{
    content:"";
    position:absolute;
    inset:0;
    z-index:-1;
    opacity:0;
    background:radial-gradient(120px 120px at var(--mx,50%) var(--my,50%), var(--purple-glow), transparent 70%);
    transition:opacity .35s ease;
  }

  .card:active{
    transform:scale(.97);
  }

  .card .icon{
    flex:0 0 auto;
    width:56px;
    height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    background:linear-gradient(150deg,#3a2a58,#241734);
    border:1px solid var(--border);
    border-radius:16px;
    transition:transform .3s ease;
  }

  .card .info{
    flex:1 1 auto;
    min-width:0;
  }

  .card .info h2{
    margin:0 0 4px;
    font-size:17px;
    font-weight:700;
    color:var(--text-main);
  }

  .card .info p{
    margin:0;
    font-size:12.5px;
    line-height:1.5;
    color:var(--text-sub);
  }

  .card .arrow{
    flex:0 0 auto;
    font-size:18px;
    color:var(--purple-2);
    opacity:.6;
    transform:translateX(0);
    transition:transform .28s ease, opacity .28s ease;
  }

  @media (hover:hover) and (pointer:fine){
    .card:hover{
      transform:translateY(-4px);
      border-color:#5b3f8a;
      box-shadow:0 16px 32px -16px var(--purple-glow), 0 6px 18px -10px #00000090;
      background:linear-gradient(155deg, var(--card-hover), #2a1d40);
    }
    .card:hover::before{ opacity:1; }
    .card:hover .icon{ transform:scale(1.08) rotate(-4deg); }
    .card:hover .arrow{ transform:translateX(4px); opacity:1; }
  }

  .card:nth-of-type(1){ animation-delay:.08s; }
  .card:nth-of-type(2){ animation-delay:.16s; }
  .card:nth-of-type(3){ animation-delay:.24s; }
  .card:nth-of-type(4){ animation-delay:.32s; }
  .card:nth-of-type(5){ animation-delay:.40s; }
  .card:nth-of-type(6){ animation-delay:.48s; }

  footer{
    margin-top:48px;
    text-align:center;
  }

  footer p{
    margin:0;
    font-size:11px;
    letter-spacing:.5px;
    color:#6e6180;
  }

  @keyframes cardIn{
    to{ opacity:1; transform:translateY(0); }
  }

  @keyframes fadeDown{
    from{ opacity:0; transform:translateY(-10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @media (max-width:340px){
    h1{ font-size:32px; }
    .card{ padding:16px; gap:12px; }
    .card .icon{ width:48px; height:48px; font-size:24px; }
  }
</style>
</head>
<body>

  <div class="wrap">
    <header>
      <div class="sparkle-row">💜 🌟 💜</div>
      <h1>38apps</h1>
      <p class="subtitle">推し活や趣味のために作った便利ツール集</p>
    </header>

    <main id="appList"></main>

    <footer>
      <p>Made by 38</p>
    </footer>
  </div>

<script>
  // アプリを増やす場合はこの配列に追記するだけでOK
  const apps = [
    {
      name: "限界現場シミュレーター",
      description: "遠征費や予算をシミュレーションできるアプリ",
      icon: "🚄",
      url: "./osimulator/"
    },
    {
      name: "ポーカー",
      description: "ポーカー練習用ツール",
      icon: "♠️",
      url: "./poker-range/"
    },
    {
      name: "持った？",
      description: "現場や遠征の持ち物チェックアプリ",
      icon: "🎒",
      url: "./motta/"
    },
    {
      name: "そのうちやる",
      description: "あとでやることを管理するアプリ",
      icon: "📝",
      url: "./sonouchi/"
    }
  ];

  const list = document.getElementById('appList');

  apps.forEach(app => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = app.url;
    card.setAttribute('aria-label', app.name + ' を開く');

    card.innerHTML = `
      <div class="icon">${app.icon}</div>
      <div class="info">
        <h2>${app.name}</h2>
        <p>${app.description}</p>
      </div>
      <div class="arrow">›</div>
    `;

    // ホバー時にカーソル位置へ光の演出を追従させる（PCのみ）
    card.addEventListener('pointermove', e => {
      const rect = card.getBoundingClientRect();
      card.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
      card.style.setProperty('--my', (e.clientY - rect.top) + 'px');
    });

    list.appendChild(card);
  });
</script>

</body>
</html>
