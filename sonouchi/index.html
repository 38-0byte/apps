<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>そのうちやる。</title>
  <style>
/* ===========================
   CSS変数・リセット
=========================== */
:root {
  --bg: #0f0f10;
  --card: #1b1b1d;
  --card-hover: #232326;
  --accent: #b78cff;
  --accent-dim: #8a60d0;
  --text: #f5f5f5;
  --text-muted: #888;
  --danger: #ff6b6b;
  --success: #6bffb8;
  --border: #2e2e32;
  --radius: 16px;
  --radius-sm: 10px;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN",
    "Noto Sans JP", sans-serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 40px;
}

button {
  cursor: pointer;
  font-family: inherit;
  border: none;
  background: none;
}

input, datalist {
  font-family: inherit;
}

/* ===========================
   ヘッダー
=========================== */
.app-header {
  text-align: center;
  padding: 28px 20px 12px;
}

.app-title {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--accent);
}

.app-subtitle {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 0.03em;
}

/* ===========================
   タブナビゲーション
=========================== */
.tab-nav {
  display: flex;
  gap: 4px;
  padding: 0 16px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--border);
}

.tab-btn {
  flex: 1;
  padding: 10px 0;
  font-size: 0.85rem;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}

.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ===========================
   タブパネル
=========================== */
.tab-panel {
  display: none;
  padding: 16px;
}

.tab-panel.active {
  display: block;
}

/* ===========================
   ガチャ画面
=========================== */
.gacha-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 20px 0 10px;
}

.gacha-idle {
  text-align: center;
  padding: 20px;
}

.gacha-icon {
  font-size: 3.5rem;
  margin-bottom: 12px;
}

.gacha-description {
  color: var(--text-muted);
  font-size: 0.9rem;
  line-height: 1.7;
}

/* ローディング */
.gacha-loading {
  text-align: center;
  padding: 24px;
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  margin: 0 auto 16px;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  color: var(--text-muted);
  font-size: 0.9rem;
}

/* ガチャ結果カード */
.gacha-result-card {
  background: var(--card);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 24px 20px;
  width: 100%;
  text-align: center;
  box-shadow: 0 0 24px rgba(183, 140, 255, 0.15);
  animation: fadeInUp 0.4s ease;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.gacha-result-label {
  font-size: 0.8rem;
  color: var(--accent);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.gacha-result-category {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.gacha-result-title {
  font-size: 1.4rem;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 12px;
}

.gacha-result-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-bottom: 12px;
}

.gacha-result-priority {
  color: var(--accent);
  font-size: 1rem;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

.gacha-done-btn {
  width: 100%;
}

/* 気分選択エリア */
.mood-select-area {
  width: 100%;
}

.mood-label {
  font-size: 0.9rem;
  color: var(--text-muted);
  margin-bottom: 10px;
  text-align: center;
}

.mood-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.mood-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 10px 8px;
  font-size: 0.82rem;
  text-align: left;
  transition: background 0.15s, border-color 0.15s;
}

.mood-btn:hover,
.mood-btn:active {
  background: var(--card-hover);
  border-color: var(--accent);
}

/* ガチャボタン */
.btn-gacha {
  width: 100%;
  background: var(--accent);
  color: #0f0f10;
  font-size: 1rem;
  font-weight: 700;
  padding: 16px;
  border-radius: var(--radius);
  letter-spacing: 0.04em;
  transition: background 0.15s, transform 0.1s;
  box-shadow: 0 4px 20px rgba(183, 140, 255, 0.3);
}

.btn-gacha:active {
  transform: scale(0.98);
  background: var(--accent-dim);
}

/* ===========================
   一覧画面
=========================== */
.list-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.section-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

/* ===========================
   アイテムカード
=========================== */
.item-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  transition: border-color 0.15s;
}

.item-card:hover {
  border-color: #444;
}

.item-card.overdue {
  border-color: #5a3300;
}

.item-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 6px;
}

.item-title {
  font-size: 0.98rem;
  font-weight: 600;
  line-height: 1.4;
  flex: 1;
}

.item-priority {
  color: var(--accent);
  font-size: 0.75rem;
  letter-spacing: 1px;
  white-space: nowrap;
}

.item-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  margin-bottom: 8px;
}

.item-category {
  font-size: 0.75rem;
  background: #28282e;
  border-radius: 6px;
  padding: 2px 8px;
  color: var(--text-muted);
}

.item-days {
  font-size: 0.72rem;
  color: var(--text-muted);
}

.item-days.overdue-label {
  color: #ff9944;
}

.item-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
}

.tag-chip {
  font-size: 0.7rem;
  background: #1e1e24;
  border: 1px solid #3a3a44;
  border-radius: 20px;
  padding: 2px 8px;
  color: var(--text-muted);
}

.item-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* ===========================
   達成済み履歴カード
=========================== */
.history-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
}

.history-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 4px;
}

.history-title {
  font-size: 0.95rem;
  font-weight: 600;
  flex: 1;
}

.history-undo {
  font-size: 0.75rem;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px 8px;
  transition: color 0.15s, border-color 0.15s;
}

.history-undo:hover {
  color: var(--text);
  border-color: #555;
}

.history-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ===========================
   ボタン共通
=========================== */
.btn {
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  font-size: 0.82rem;
  font-weight: 600;
  transition: background 0.15s, opacity 0.15s;
}

.btn-primary {
  background: var(--accent);
  color: #0f0f10;
}

.btn-primary:hover { background: var(--accent-dim); }

.btn-secondary {
  background: #2a2a2e;
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover { background: #333338; }

.btn-success {
  background: var(--success);
  color: #0f0f10;
}

.btn-success:hover { background: #4fd9a0; }

.btn-danger {
  background: var(--danger);
  color: #0f0f10;
}

.btn-danger:hover { background: #e05555; }

.btn-add {
  background: var(--accent);
  color: #0f0f10;
  font-size: 0.82rem;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
}

.btn-edit {
  background: #2a2a2e;
  color: var(--text-muted);
  border: 1px solid var(--border);
  font-size: 0.75rem;
  padding: 5px 10px;
  border-radius: 8px;
}

.btn-edit:hover { color: var(--text); }

.btn-delete {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  font-size: 0.75rem;
  padding: 5px 10px;
  border-radius: 8px;
}

.btn-delete:hover { color: var(--danger); border-color: var(--danger); }

.btn-done {
  background: transparent;
  color: var(--success);
  border: 1px solid var(--success);
  font-size: 0.75rem;
  padding: 5px 10px;
  border-radius: 8px;
}

.btn-done:hover { background: rgba(107, 255, 184, 0.1); }

/* ===========================
   空ステート
=========================== */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
}

.empty-icon {
  font-size: 2.5rem;
  margin-bottom: 12px;
}

.empty-state p {
  font-size: 0.85rem;
  line-height: 1.8;
}

/* ===========================
   モーダル
=========================== */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  padding: 0;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal {
  background: var(--card);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 20px;
  animation: slideUp 0.25s ease;
}

@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

.modal-sm {
  border-radius: var(--radius);
  max-width: 320px;
  width: calc(100% - 40px);
  margin: auto;
  padding: 24px 20px;
  animation: fadeInScale 0.2s ease;
}

@keyframes fadeInScale {
  from { opacity: 0; transform: scale(0.95); }
  to   { opacity: 1; transform: scale(1); }
}

/* 削除確認は画面中央に表示 */
#confirm-overlay {
  align-items: center;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.modal-title {
  font-size: 1rem;
  font-weight: 700;
}

.modal-close {
  color: var(--text-muted);
  font-size: 1.1rem;
  padding: 4px 8px;
}

.modal-close:hover { color: var(--text); }

/* ===========================
   フォーム
=========================== */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.required {
  color: var(--accent);
}

.form-input {
  width: 100%;
  background: #111114;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.95rem;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.15s;
}

.form-input:focus {
  border-color: var(--accent);
}

.form-input::placeholder {
  color: #555;
}

/* 気分タグチェックボックス */
.tag-checkboxes {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.tag-checkbox {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #111114;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  cursor: pointer;
  transition: border-color 0.15s;
}

.tag-checkbox:hover {
  border-color: var(--accent);
}

.tag-checkbox input[type="checkbox"] {
  accent-color: var(--accent);
  width: 15px;
  height: 15px;
}

.tag-checkbox span {
  font-size: 0.8rem;
}

/* 優先度★ */
.priority-select {
  display: flex;
  gap: 6px;
}

.star-btn {
  font-size: 1.5rem;
  color: #444;
  transition: color 0.1s, transform 0.1s;
  line-height: 1;
}

.star-btn.active {
  color: var(--accent);
}

.star-btn:hover {
  transform: scale(1.1);
}

/* モーダルアクション */
.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}

/* 削除確認 */
.confirm-text {
  font-size: 0.95rem;
  margin-bottom: 20px;
  line-height: 1.6;
}

/* ===========================
   ユーティリティ
=========================== */
.hidden {
  display: none !important;
}

/* ===========================
   スクロールバー
=========================== */
::-webkit-scrollbar {
  width: 4px;
}

::-webkit-scrollbar-track {
  background: var(--bg);
}

::-webkit-scrollbar-thumb {
  background: #333;
  border-radius: 4px;
}

/* ===========================
   認証画面
=========================== */
#auth-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 32px 24px;
}

.auth-title {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}

.auth-subtitle {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 40px;
  letter-spacing: 0.03em;
}

.auth-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  width: 100%;
  max-width: 320px;
  text-align: center;
}

.auth-label {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 14px;
}

.auth-input {
  width: 100%;
  background: #111114;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 1.4rem;
  letter-spacing: 0.3em;
  text-align: center;
  padding: 12px;
  outline: none;
  transition: border-color 0.15s;
  margin-bottom: 16px;
}

.auth-input:focus {
  border-color: var(--accent);
}

.auth-input.error {
  border-color: var(--danger);
  animation: shake 0.3s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25%       { transform: translateX(-6px); }
  75%       { transform: translateX(6px); }
}

.auth-error {
  font-size: 0.8rem;
  color: var(--danger);
  min-height: 1.2em;
  margin-bottom: 14px;
}

.btn-auth {
  width: 100%;
  background: var(--accent);
  color: #0f0f10;
  font-size: 0.95rem;
  font-weight: 700;
  padding: 13px;
  border-radius: var(--radius-sm);
  transition: background 0.15s;
}

.btn-auth:hover { background: var(--accent-dim); }
.btn-auth:active { background: var(--accent-dim); }
  </style>
</head>
<body>
  <!-- 認証画面 -->
  <div id="auth-screen">
    <div class="auth-title">そのうちやる。</div>
    <div class="auth-subtitle">今じゃないけど、忘れたくないこと。</div>
    <div class="auth-card">
      <p class="auth-label">パスワードを入力してください</p>
      <input
        type="password"
        id="auth-input"
        class="auth-input"
        maxlength="10"
        autocomplete="current-password"
        placeholder="····"
      />
      <p class="auth-error" id="auth-error"></p>
      <button class="btn-auth" id="auth-btn">入力する</button>
    </div>
  </div>

  <!-- ヘッダー -->
  <header class="app-header">
    <div class="app-title">そのうちやる。</div>
    <div class="app-subtitle">今じゃないけど、忘れたくないこと。</div>
  </header>

  <!-- ナビゲーション -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="gacha">ガチャ</button>
    <button class="tab-btn" data-tab="list">一覧</button>
    <button class="tab-btn" data-tab="history">達成済み</button>
  </nav>

  <!-- メインコンテンツ -->
  <main class="main-content">

    <!-- ガチャ画面 -->
    <section id="tab-gacha" class="tab-panel active">
      <div class="gacha-area">
        <div class="gacha-result-card hidden" id="gacha-result">
          <div class="gacha-result-label">今日はこれ！</div>
          <div class="gacha-result-category" id="result-category"></div>
          <div class="gacha-result-title" id="result-title"></div>
          <div class="gacha-result-tags" id="result-tags"></div>
          <div class="gacha-result-priority" id="result-priority"></div>
          <button class="btn btn-success gacha-done-btn" id="gacha-done-btn">✓ これをやった！</button>
        </div>

        <div class="gacha-loading hidden" id="gacha-loading">
          <div class="loading-spinner"></div>
          <div class="loading-text" id="loading-text"></div>
        </div>

        <div class="gacha-idle" id="gacha-idle">
          <div class="gacha-icon">🎲</div>
          <p class="gacha-description">気分に合わせて<br>やることをランダム提案</p>
        </div>

        <!-- 気分選択モーダル -->
        <div class="mood-select-area" id="mood-select-area">
          <p class="mood-label">今の気分は？</p>
          <div class="mood-buttons">
            <button class="mood-btn" data-mood="家で過ごしたい">🏠 家で過ごしたい</button>
            <button class="mood-btn" data-mood="出かけたい">🚗 出かけたい</button>
            <button class="mood-btn" data-mood="推し活したい">⭐ 推し活したい</button>
            <button class="mood-btn" data-mood="お金を使いたい">💸 お金を使いたい</button>
            <button class="mood-btn" data-mood="お金を使いたくない">🌿 お金を使いたくない</button>
            <button class="mood-btn" data-mood="">🎲 指定なし</button>
          </div>
        </div>

        <button class="btn btn-gacha" id="gacha-btn">今日はこれにする</button>
      </div>
    </section>

    <!-- 一覧画面 -->
    <section id="tab-list" class="tab-panel">
      <div class="list-header">
        <h2 class="section-title">やりたいこと一覧</h2>
        <button class="btn btn-add" id="add-btn">＋ 追加</button>
      </div>
      <div class="item-list" id="item-list">
        <!-- アイテムがJSで挿入される -->
      </div>
      <div class="empty-state hidden" id="list-empty">
        <div class="empty-icon">📭</div>
        <p>まだ登録されていません。<br>「＋ 追加」からやりたいことを登録しよう！</p>
      </div>
    </section>

    <!-- 達成済み画面 -->
    <section id="tab-history" class="tab-panel">
      <h2 class="section-title">達成済み</h2>
      <div class="item-list" id="history-list">
        <!-- 達成済みアイテムがJSで挿入される -->
      </div>
      <div class="empty-state hidden" id="history-empty">
        <div class="empty-icon">🏆</div>
        <p>まだ達成済みのものはありません。<br>ガチャを回してみよう！</p>
      </div>
    </section>

  </main>

  <!-- 登録・編集モーダル -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">新しく登録</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="item-form" class="modal-form">
        <input type="hidden" id="edit-id" />

        <div class="form-group">
          <label class="form-label" for="input-title">タイトル <span class="required">*</span></label>
          <input type="text" id="input-title" class="form-input" placeholder="例：郡上八幡ドライブ" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="input-category">カテゴリ</label>
          <input type="text" id="input-category" class="form-input" placeholder="例：ドライブ、カフェ、映画…" list="category-list" />
          <datalist id="category-list"></datalist>
        </div>

        <div class="form-group">
          <label class="form-label">気分タグ（複数選択可）</label>
          <div class="tag-checkboxes" id="tag-checkboxes">
            <label class="tag-checkbox"><input type="checkbox" value="家で過ごしたい" /><span>🏠 家で過ごしたい</span></label>
            <label class="tag-checkbox"><input type="checkbox" value="出かけたい" /><span>🚗 出かけたい</span></label>
            <label class="tag-checkbox"><input type="checkbox" value="推し活したい" /><span>⭐ 推し活したい</span></label>
            <label class="tag-checkbox"><input type="checkbox" value="お金を使いたい" /><span>💸 お金を使いたい</span></label>
            <label class="tag-checkbox"><input type="checkbox" value="お金を使いたくない" /><span>🌿 お金を使いたくない</span></label>
            <label class="tag-checkbox"><input type="checkbox" value="のんびりしたい" /><span>🍵 のんびりしたい</span></label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">優先度</label>
          <div class="priority-select" id="priority-select">
            <button type="button" class="star-btn" data-value="1">★</button>
            <button type="button" class="star-btn" data-value="2">★</button>
            <button type="button" class="star-btn" data-value="3">★</button>
            <button type="button" class="star-btn" data-value="4">★</button>
            <button type="button" class="star-btn" data-value="5">★</button>
          </div>
          <input type="hidden" id="input-priority" value="3" />
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="modal-cancel">キャンセル</button>
          <button type="submit" class="btn btn-primary">保存する</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 削除確認モーダル -->
  <div class="modal-overlay hidden" id="confirm-overlay">
    <div class="modal modal-sm">
      <p class="confirm-text" id="confirm-text">削除しますか？</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="confirm-cancel">やめる</button>
        <button class="btn btn-danger" id="confirm-ok">削除する</button>
      </div>
    </div>
  </div>

  <script>
/* ===========================
   そのうちやる。- メインロジック
=========================== */

// ===========================
// 定数
// ===========================
const STORAGE_KEY = 'sonouchi_items';
const INITIALIZED_KEY = 'sonouchi_initialized';

const MOOD_TAGS = [
  '家で過ごしたい',
  '出かけたい',
  '推し活したい',
  'お金を使いたい',
  'お金を使いたくない',
  'のんびりしたい',
];

const LOADING_MESSAGES = [
  '未来の自分を呼び出しています…',
  'やる気を探しています…',
  '気分を集計中…',
  '思いつきを発掘中…',
  'そのうちを検索中…',
];

const SAMPLE_ITEMS = [
  { title: '郡上八幡ドライブ', category: 'ドライブ', moodTags: ['出かけたい'], priority: 4 },
  { title: '純喫茶巡り', category: 'カフェ', moodTags: ['出かけたい', 'のんびりしたい'], priority: 3 },
  { title: '気になっていた映画を見る', category: '映画', moodTags: ['家で過ごしたい', 'のんびりしたい'], priority: 3 },
  { title: '部屋の片付け', category: '家事', moodTags: ['家で過ごしたい', 'お金を使いたくない'], priority: 2 },
];

// ===========================
// データ管理
// ===========================

/** LocalStorageから全アイテムを読み込む */
function loadItems() {
  const raw = localStorage.getItem(STORAGE_KEY);
  return raw ? JSON.parse(raw) : [];
}

/** LocalStorageにアイテムを保存する */
function saveItems(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

/** 新規アイテムを生成して保存 */
function createItem({ title, category, moodTags, priority }) {
  const items = loadItems();
  const newItem = {
    id: Date.now().toString(),
    title,
    category,
    moodTags,
    priority,
    completed: false,
    createdAt: new Date().toISOString(),
    completedAt: null,
  };
  items.push(newItem);
  saveItems(items);
  return newItem;
}

/** アイテムを更新して保存 */
function updateItem(id, fields) {
  const items = loadItems();
  const idx = items.findIndex(i => i.id === id);
  if (idx === -1) return;
  items[idx] = { ...items[idx], ...fields };
  saveItems(items);
}

/** アイテムを削除 */
function deleteItem(id) {
  const items = loadItems().filter(i => i.id !== id);
  saveItems(items);
}

/** 初回起動時のサンプルデータ投入 */
function initSampleData() {
  if (localStorage.getItem(INITIALIZED_KEY)) return;
  SAMPLE_ITEMS.forEach(s => createItem(s));
  localStorage.setItem(INITIALIZED_KEY, '1');
}

// ===========================
// ユーティリティ
// ===========================

/** 登録日からの経過日数を返す */
function daysSince(isoString) {
  const ms = Date.now() - new Date(isoString).getTime();
  return Math.floor(ms / (1000 * 60 * 60 * 24));
}

/** 達成日時を人が読める形式に変換 */
function formatDate(isoString) {
  if (!isoString) return '';
  const d = new Date(isoString);
  return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
}

/** 優先度を★文字列に変換 */
function starsText(priority) {
  return '★'.repeat(priority) + '☆'.repeat(5 - priority);
}

/** 配列からランダムに1件取得 */
function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

/**
 * 重み付きランダム抽選
 * 優先度が高いほど出やすい（優先度の2乗を重みにする）
 */
function weightedRandom(items) {
  const weights = items.map(i => i.priority * i.priority);
  const total = weights.reduce((a, b) => a + b, 0);
  let rand = Math.random() * total;
  for (let i = 0; i < items.length; i++) {
    rand -= weights[i];
    if (rand <= 0) return items[i];
  }
  return items[items.length - 1];
}

// ===========================
// DOM参照キャッシュ
// ===========================
const $ = id => document.getElementById(id);

const els = {
  tabBtns:       document.querySelectorAll('.tab-btn'),
  tabPanels:     document.querySelectorAll('.tab-panel'),
  // ガチャ
  gachaBtn:      $('gacha-btn'),
  gachaIdle:     $('gacha-idle'),
  gachaLoading:  $('gacha-loading'),
  loadingText:   $('loading-text'),
  gachaResult:   $('gacha-result'),
  resultCategory:$('result-category'),
  resultTitle:   $('result-title'),
  resultTags:    $('result-tags'),
  resultPriority:$('result-priority'),
  gachaDoneBtn:  $('gacha-done-btn'),
  moodSelectArea:$('mood-select-area'),
  // 一覧
  addBtn:        $('add-btn'),
  itemList:      $('item-list'),
  listEmpty:     $('list-empty'),
  // 履歴
  historyList:   $('history-list'),
  historyEmpty:  $('history-empty'),
  // 登録モーダル
  modalOverlay:  $('modal-overlay'),
  modalTitle:    $('modal-title'),
  modalClose:    $('modal-close'),
  modalCancel:   $('modal-cancel'),
  itemForm:      $('item-form'),
  editId:        $('edit-id'),
  inputTitle:    $('input-title'),
  inputCategory: $('input-category'),
  inputPriority: $('input-priority'),
  categoryList:  $('category-list'),
  // 削除確認
  confirmOverlay:$('confirm-overlay'),
  confirmText:   $('confirm-text'),
  confirmCancel: $('confirm-cancel'),
  confirmOk:     $('confirm-ok'),
};

// ===========================
// タブ切り替え
// ===========================
function switchTab(tabName) {
  els.tabBtns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tabName);
  });
  els.tabPanels.forEach(panel => {
    panel.classList.toggle('active', panel.id === `tab-${tabName}`);
  });
}

els.tabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    switchTab(btn.dataset.tab);
    if (btn.dataset.tab === 'list') renderList();
    if (btn.dataset.tab === 'history') renderHistory();
  });
});

// ===========================
// 一覧レンダリング
// ===========================
function renderList() {
  const items = loadItems().filter(i => !i.completed);
  els.itemList.innerHTML = '';

  if (items.length === 0) {
    els.listEmpty.classList.remove('hidden');
    return;
  }
  els.listEmpty.classList.add('hidden');

  items.forEach(item => {
    const days = daysSince(item.createdAt);
    const isOverdue = days >= 90;
    const card = document.createElement('div');
    card.className = 'item-card' + (isOverdue ? ' overdue' : '');
    card.innerHTML = `
      <div class="item-top">
        <div class="item-title">${escapeHtml(item.title)}</div>
        <div class="item-priority">${starsText(item.priority)}</div>
      </div>
      <div class="item-meta">
        ${item.category ? `<span class="item-category">${escapeHtml(item.category)}</span>` : ''}
        <span class="item-days ${isOverdue ? 'overdue-label' : ''}">
          ${isOverdue ? '🔥 長期間放置中' : `登録から${days}日経過`}
        </span>
      </div>
      ${item.moodTags.length ? `
        <div class="item-tags">
          ${item.moodTags.map(t => `<span class="tag-chip">${escapeHtml(t)}</span>`).join('')}
        </div>` : ''}
      <div class="item-actions">
        <button class="btn btn-edit" data-id="${item.id}" data-action="edit">編集</button>
        <button class="btn btn-delete" data-id="${item.id}" data-action="delete">削除</button>
        <button class="btn btn-done" data-id="${item.id}" data-action="done">✓ 達成</button>
      </div>`;
    els.itemList.appendChild(card);
  });

  // カテゴリdatalist更新
  updateCategoryDatalist();
}

/** 達成済み履歴レンダリング */
function renderHistory() {
  const items = loadItems().filter(i => i.completed)
    .sort((a, b) => new Date(b.completedAt) - new Date(a.completedAt));
  els.historyList.innerHTML = '';

  if (items.length === 0) {
    els.historyEmpty.classList.remove('hidden');
    return;
  }
  els.historyEmpty.classList.add('hidden');

  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'history-card';
    card.innerHTML = `
      <div class="history-top">
        <div class="history-title">${escapeHtml(item.title)}</div>
        <button class="history-undo" data-id="${item.id}" data-action="undo">取り消し</button>
      </div>
      <div class="history-meta">
        <span>✓ ${formatDate(item.completedAt)}</span>
        ${item.category ? `<span>${escapeHtml(item.category)}</span>` : ''}
      </div>`;
    els.historyList.appendChild(card);
  });
}

// ===========================
// イベント委任（一覧・履歴）
// ===========================
els.itemList.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const { id, action } = btn.dataset;
  if (action === 'edit') openEditModal(id);
  if (action === 'delete') openDeleteConfirm(id);
  if (action === 'done') markDone(id);
});

els.historyList.addEventListener('click', e => {
  const btn = e.target.closest('[data-action="undo"]');
  if (!btn) return;
  undoDone(btn.dataset.id);
});

function markDone(id) {
  updateItem(id, { completed: true, completedAt: new Date().toISOString() });
  renderList();
}

function undoDone(id) {
  updateItem(id, { completed: false, completedAt: null });
  renderHistory();
}

// ===========================
// ガチャ機能
// ===========================
let gachaResultItem = null; // 直近のガチャ結果

// ガチャボタン押下 → 気分選択を表示
els.gachaBtn.addEventListener('click', () => {
  const hasItems = loadItems().some(i => !i.completed);
  if (!hasItems) {
    alert('登録されているやりたいことがありません。\n一覧タブから追加してみてください！');
    return;
  }
  // 既に気分選択が開いていれば閉じる
  if (!els.moodSelectArea.classList.contains('hidden')) {
    els.moodSelectArea.classList.add('hidden');
    return;
  }
  els.gachaResult.classList.add('hidden');
  els.gachaIdle.classList.remove('hidden');
  els.moodSelectArea.classList.remove('hidden');
});

// 気分ボタン押下 → 抽選実行
els.moodSelectArea.addEventListener('click', e => {
  const btn = e.target.closest('.mood-btn');
  if (!btn) return;
  const mood = btn.dataset.mood;
  els.moodSelectArea.classList.add('hidden');
  runGacha(mood);
});

function runGacha(mood) {
  // 候補抽出
  const candidates = loadItems().filter(i => {
    if (i.completed) return false;
    if (!mood) return true; // 指定なし
    return i.moodTags.includes(mood);
  });

  if (candidates.length === 0) {
    // 気分一致なし → 指定なしで再抽選
    const all = loadItems().filter(i => !i.completed);
    if (all.length === 0) {
      showGachaIdle();
      alert('登録されているやりたいことがありません。');
      return;
    }
    gachaResultItem = weightedRandom(all);
  } else {
    gachaResultItem = weightedRandom(candidates);
  }

  // ローディング演出
  showLoading();
  const delay = 600 + Math.random() * 500;
  setTimeout(() => showResult(gachaResultItem), delay);
}

function showLoading() {
  els.gachaIdle.classList.add('hidden');
  els.gachaResult.classList.add('hidden');
  els.gachaLoading.classList.remove('hidden');
  els.loadingText.textContent = pickRandom(LOADING_MESSAGES);
}

function showResult(item) {
  els.gachaLoading.classList.add('hidden');
  els.gachaResult.classList.remove('hidden');
  els.resultCategory.textContent = item.category || '';
  els.resultTitle.textContent = item.title;
  els.resultTags.innerHTML = item.moodTags
    .map(t => `<span class="tag-chip">${escapeHtml(t)}</span>`)
    .join('');
  els.resultPriority.textContent = starsText(item.priority);
}

function showGachaIdle() {
  els.gachaLoading.classList.add('hidden');
  els.gachaResult.classList.add('hidden');
  els.gachaIdle.classList.remove('hidden');
}

// ガチャ結果から達成ボタン
els.gachaDoneBtn.addEventListener('click', () => {
  if (!gachaResultItem) return;
  markDone(gachaResultItem.id);
  gachaResultItem = null;
  els.gachaResult.classList.add('hidden');
  els.gachaIdle.classList.remove('hidden');
  // 達成済みタブへ切り替え
  switchTab('history');
  renderHistory();
});

// ===========================
// 登録・編集モーダル
// ===========================
let currentPriority = 3;

function openAddModal() {
  els.modalTitle.textContent = '新しく登録';
  els.editId.value = '';
  els.itemForm.reset();
  setStars(3);
  // チェックボックスを全てリセット
  document.querySelectorAll('#tag-checkboxes input[type="checkbox"]')
    .forEach(cb => (cb.checked = false));
  openModal();
}

function openEditModal(id) {
  const item = loadItems().find(i => i.id === id);
  if (!item) return;
  els.modalTitle.textContent = '編集';
  els.editId.value = id;
  els.inputTitle.value = item.title;
  els.inputCategory.value = item.category || '';
  setStars(item.priority);
  document.querySelectorAll('#tag-checkboxes input[type="checkbox"]')
    .forEach(cb => (cb.checked = item.moodTags.includes(cb.value)));
  openModal();
}

function openModal() {
  els.modalOverlay.classList.remove('hidden');
  setTimeout(() => els.inputTitle.focus(), 50);
}

function closeModal() {
  els.modalOverlay.classList.add('hidden');
}

els.addBtn.addEventListener('click', openAddModal);
els.modalClose.addEventListener('click', closeModal);
els.modalCancel.addEventListener('click', closeModal);
els.modalOverlay.addEventListener('click', e => {
  if (e.target === els.modalOverlay) closeModal();
});

els.itemForm.addEventListener('submit', e => {
  e.preventDefault();
  const title = els.inputTitle.value.trim();
  if (!title) return;
  const category = els.inputCategory.value.trim();
  const moodTags = [...document.querySelectorAll('#tag-checkboxes input:checked')]
    .map(cb => cb.value);
  const priority = parseInt(els.inputPriority.value, 10);

  const id = els.editId.value;
  if (id) {
    updateItem(id, { title, category, moodTags, priority });
  } else {
    createItem({ title, category, moodTags, priority });
  }
  closeModal();
  renderList();
});

// ===========================
// 優先度★ UI
// ===========================
function setStars(value) {
  currentPriority = value;
  els.inputPriority.value = value;
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.value) <= value);
  });
}

document.querySelectorAll('.star-btn').forEach(btn => {
  btn.addEventListener('click', () => setStars(parseInt(btn.dataset.value)));
  // ホバー時のプレビュー
  btn.addEventListener('mouseenter', () => {
    const v = parseInt(btn.dataset.value);
    document.querySelectorAll('.star-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.value) <= v);
    });
  });
  btn.addEventListener('mouseleave', () => setStars(currentPriority));
});

// ===========================
// カテゴリ datalist 更新
// ===========================
function updateCategoryDatalist() {
  const categories = [...new Set(
    loadItems().map(i => i.category).filter(Boolean)
  )];
  els.categoryList.innerHTML = categories
    .map(c => `<option value="${escapeHtml(c)}">`)
    .join('');
}

// ===========================
// 削除確認モーダル
// ===========================
let pendingDeleteId = null;

function openDeleteConfirm(id) {
  const item = loadItems().find(i => i.id === id);
  if (!item) return;
  pendingDeleteId = id;
  els.confirmText.textContent = `「${item.title}」を削除しますか？`;
  els.confirmOverlay.classList.remove('hidden');
}

els.confirmCancel.addEventListener('click', () => {
  els.confirmOverlay.classList.add('hidden');
  pendingDeleteId = null;
});

els.confirmOk.addEventListener('click', () => {
  if (pendingDeleteId) {
    deleteItem(pendingDeleteId);
    pendingDeleteId = null;
  }
  els.confirmOverlay.classList.add('hidden');
  renderList();
});

els.confirmOverlay.addEventListener('click', e => {
  if (e.target === els.confirmOverlay) {
    els.confirmOverlay.classList.add('hidden');
    pendingDeleteId = null;
  }
});

// ===========================
// XSS対策: HTMLエスケープ
// ===========================
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ===========================
// 認証
// ===========================
const AUTH_KEY = 'sonouchi_authed';
const CORRECT_PW = '3824';

const authScreen = document.getElementById('auth-screen');
const authInput  = document.getElementById('auth-input');
const authBtn    = document.getElementById('auth-btn');
const authError  = document.getElementById('auth-error');

function showApp() {
  authScreen.style.display = 'none';
}

function tryAuth() {
  if (authInput.value === CORRECT_PW) {
    sessionStorage.setItem(AUTH_KEY, '1');
    showApp();
  } else {
    authError.textContent = 'パスワードが違います';
    authInput.classList.add('error');
    authInput.value = '';
    setTimeout(() => authInput.classList.remove('error'), 400);
  }
}

authBtn.addEventListener('click', tryAuth);
authInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') tryAuth();
});

// ===========================
// 初期化
// ===========================
function init() {
  // 認証チェック
  if (sessionStorage.getItem(AUTH_KEY)) {
    showApp();
  } else {
    setTimeout(() => authInput.focus(), 50);
  }

  initSampleData();
  renderList();
}

init();
  </script>
</body>
</html>
